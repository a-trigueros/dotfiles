"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[✖](bold red)"

[package]
disabled = true

[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = "⚡"

[[battery.display]]
threshold = 30
style = "bold red"

[cmd_duration]
min_time = 10_000
format = " took [$duration]($style)"

[directory]
truncation_length = 5
format = "[$path]($style)[$lock_symbol]($lock_style) "

[custom.jj]
description = "The current jj status"
when = 'pwsh -NoProfile -Command "jj --ignore-working-copy root 2>$null; exit $LASTEXITCODE"'
symbol = "🥋 "
command = '''pwsh -NoProfile -Command "jj log --revisions '@' --no-graph --ignore-working-copy --color always --limit 1 --template 'separate(\" \", change_id.shortest(4), bookmarks, \"|\", concat(if(conflict, \"💥\"), if(divergent, \"🚧\"), if(hidden, \"👻\"), if(immutable, \"🔒\")), raw_escape_sequence(\"\x1b[1;32m\") ++ if(empty, \"(empty)\"), raw_escape_sequence(\"\x1b[1;32m\") ++ coalesce(truncate_end(29, description.first_line(), \"…\"), \"(no description set)\") ++ raw_escape_sequence(\"\x1b[0m\"))' 2>$null"'''

[git_branch]
disabled = true

[custom.git_branch]
when = 'pwsh -NoProfile -Command "jj --ignore-working-copy root 2>$null; if ($LASTEXITCODE -ne 0) { git rev-parse --git-dir 2>$null; exit $LASTEXITCODE } else { exit 1 }"'
command = 'pwsh -NoProfile -Command "git branch --show-current 2>$null"'
description = "Only show git_branch if we're not in a jj repo"
format = "[$symbol$output]($style) "
symbol = "🌱 "
style = "bold yellow"

[git_commit]
disabled = true

[custom.git_commit]
when = 'pwsh -NoProfile -Command "jj --ignore-working-copy root 2>$null; if ($LASTEXITCODE -ne 0) { git rev-parse --git-dir 2>$null; exit $LASTEXITCODE } else { exit 1 }"'
command = 'pwsh -NoProfile -Command "git rev-parse --short HEAD 2>$null"'
format = "[$symbol$output]($style) "
symbol = "@"
description = "Only show git_commit if we're not in a jj repo"

[git_status]
disabled = true

[custom.git_status]
when = 'pwsh -NoProfile -Command "jj --ignore-working-copy root 2>$null; if ($LASTEXITCODE -ne 0) { git rev-parse --git-dir 2>$null; exit $LASTEXITCODE } else { exit 1 }"'
command = '''pwsh -NoProfile -Command "$status = git status --porcelain=v1 2>$null; if ($status) { $staged=0; $modified=0; $deleted=0; $renamed=0; $conflicted=0; $untracked=0; $status -split \"`n\" | ForEach-Object { if ($_ -match '^M') { $staged++ } elseif ($_ -match '^A') { $staged++ } elseif ($_ -match '^D') { $deleted++ } elseif ($_ -match '^R') { $renamed++ } elseif ($_ -match '^U') { $conflicted++ } elseif ($_ -match '^\?') { $untracked++ } elseif ($_ -match '^ M') { $modified++ } elseif ($_ -match '^ D') { $deleted++ } }; $output = ''; if ($staged -gt 0) { $output += \"+$staged\" }; if ($modified -gt 0) { $output += \"!$modified\" }; if ($deleted -gt 0) { $output += \"-$deleted\" }; if ($renamed -gt 0) { $output += \"»$renamed\" }; if ($untracked -gt 0) { $output += \"?$untracked\" }; if ($conflicted -gt 0) { $output += \"=$conflicted\" }; Write-Output $output }"'''
format = "[$output]($style) "
style = "bold red"


[git_metrics]
disabled = true

[custom.git_metrics]
when = 'pwsh -NoProfile -Command "jj --ignore-working-copy root 2>$null; if ($LASTEXITCODE -ne 0) { git rev-parse --git-dir 2>$null; exit $LASTEXITCODE } else { exit 1 }"'
command = '''pwsh -NoProfile -Command "$counts = git rev-list --left-right --count HEAD...@{upstream} 2>$null; if ($counts) { $parts = $counts -split '\s+'; $ahead = [int]$parts[0]; $behind = [int]$parts[1]; if ($ahead -gt 0 -and $behind -gt 0) { Write-Output \"↑$ahead↓$behind\" } elseif ($ahead -gt 0) { Write-Output \"↑$ahead\" } elseif ($behind -gt 0) { Write-Output \"↓$behind\" } }"'''
format = "[$output]($style) "
style = "bold blue"

[hostname]
ssh_only = true
format = "<[$hostname]($style)>"
trim_at = "-"
style = "bold dimmed white"
disabled = true

[username]
style_user = "bold dimmed blue"
show_always = false

[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
threshold = 70
style = "bold dimmed white"
disabled = false

[time]
time_format = "%T"
format = "🕙 $time($style) "
style = "bright-white"
disabled = false

[julia]
format = "[$symbol$version]($style) "
symbol = "ஃ "
style = "bold green"

[python]
format = "[$symbol$version]($style) "
style = "bold green"

[rust]
format = "[$symbol$version]($style) "
style = "bold green"

[nodejs]
format = "via [🤖 $version](bold green) "

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
